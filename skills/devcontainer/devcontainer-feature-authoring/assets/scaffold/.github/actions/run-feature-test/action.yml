name: "Run feature tests"
description: >
  Install a pinned Dev Container CLI and run one mode of `devcontainer
  features test`. Every test workflow calls this action, so the CLI
  version and the invocation logic live in exactly one place.
inputs:
  mode:
    description: "autogenerated | duplicate | scenarios | global"
    required: true
  feature:
    description: "Feature id (required for every mode except global)"
    required: false
    default: ""
  base-image:
    description: "Base image for the autogenerated/duplicate modes"
    required: false
    default: "mcr.microsoft.com/devcontainers/base:ubuntu"
  cli-version:
    description: "Pinned @devcontainers/cli version"
    required: false
    default: "0.87.0"
runs:
  using: composite
  steps:
    - name: Install Dev Container CLI
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
      run: npm install -g "@devcontainers/cli@${CLI_VERSION}"

    # Untrusted inputs pass through env vars, never inline ${{ }} in the
    # script body, to avoid shell injection.
    - name: Run devcontainer features test
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        FEATURE: ${{ inputs.feature }}
        BASE_IMAGE: ${{ inputs.base-image }}
      run: |
        set -euo pipefail
        case "$MODE" in
          autogenerated)
            devcontainer features test --project-folder . \
              --skip-scenarios --skip-duplicated \
              -f "$FEATURE" -i "$BASE_IMAGE"
            ;;
          duplicate)
            devcontainer features test --project-folder . \
              --skip-scenarios --skip-autogenerated \
              -f "$FEATURE" -i "$BASE_IMAGE"
            ;;
          scenarios)
            # Scenarios pin their own images; no -i here.
            devcontainer features test --project-folder . \
              --skip-autogenerated --skip-duplicated -f "$FEATURE"
            ;;
          global)
            devcontainer features test --project-folder . \
              --global-scenarios-only
            ;;
          *)
            echo "unknown mode: $MODE (expected autogenerated|duplicate|scenarios|global)" >&2
            exit 2
            ;;
        esac
