# Broad matrix: on main and on manual dispatch, test every feature against
# every base image its test/<id>/compatibility.txt declares, plus the
# repo-global scenarios.
name: test-multios

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  features:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.list.outputs.features }}
    steps:
      - uses: actions/checkout@v4
      - name: List all features
        id: list
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          names=()
          for dir in src/*/; do
            names+=("$(basename "$dir")")
          done
          if [ ${#names[@]} -eq 0 ]; then
            echo "features=[]" >> "$GITHUB_OUTPUT"
          else
            echo "features=$(printf '%s\n' "${names[@]}" | jq -Rc . | jq -sc .)" \
              >> "$GITHUB_OUTPUT"
          fi

  matrix:
    needs: features
    if: ${{ needs.features.outputs.features != '[]' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-test-matrix
        id: build
        with:
          features: ${{ needs.features.outputs.features }}

  test-autogenerated:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-feature-test
        with:
          mode: autogenerated
          feature: ${{ matrix.feature }}
          base-image: ${{ matrix.baseImage }}

  test-duplicate:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-feature-test
        with:
          mode: duplicate
          feature: ${{ matrix.feature }}
          base-image: ${{ matrix.baseImage }}

  test-scenarios:
    needs: features
    if: ${{ needs.features.outputs.features != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.features.outputs.features) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-feature-test
        with:
          mode: scenarios
          feature: ${{ matrix.feature }}

  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-feature-test
        with:
          mode: global
