# Fast loop: on every push/PR, test only the features whose src/ or test/
# trees changed, against the default ubuntu base, in all three modes.
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.detect.outputs.features }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/detect-changed-features
        id: detect

  test:
    needs: changes
    if: ${{ needs.changes.outputs.features != '[]' && needs.changes.outputs.features != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.changes.outputs.features) }}
        mode: [autogenerated, duplicate, scenarios]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-feature-test
        with:
          mode: ${{ matrix.mode }}
          feature: ${{ matrix.feature }}
