# Validates the PR body against the PR template: every required heading
# must be present and the security checkbox must be ticked. The heading
# list below must stay in sync with .github/pull_request_template.md.
name: PR checklist

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Keep in sync with the headings in .github/pull_request_template.md.
            const required = ['## Summary', '## Changes', '## Testing', '## Checklist'];
            const missing = required.filter((heading) => !body.includes(heading));
            if (missing.length > 0) {
              core.setFailed('PR body is missing required sections: ' + missing.join(', '));
              return;
            }

            // The security checkbox must be ticked, not merely present.
            const uncheckedSecurity = body.split('\n').some(
              (line) => line.trim().startsWith('- [ ]') && line.toLowerCase().includes('secrets')
            );
            if (uncheckedSecurity) {
              core.setFailed('The security checklist item (no secrets, credentials, or personal data) is unchecked.');
              return;
            }

            core.info('PR body contains all required sections and the security checkbox is ticked.');
